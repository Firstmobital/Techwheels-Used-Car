<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 768" role="img" aria-labelledby="title desc">
  <title id="title">Techwheels Used Car Logo</title>
  <desc id="desc">Techwheels TW Used Car wordmark logo.</desc>
  <rect width="768" height="768" fill="#f3f4f6"/>

  <g transform="translate(0,4)">
    <text x="128" y="160" font-family="Arial Black, Arial, sans-serif" font-size="72" font-style="italic" font-weight="900" letter-spacing="1">
      <tspan fill="#111642">TECH</tspan><tspan fill="#1696c5">WHEELS</tspan>
    </text>

    <text x="95" y="500" font-family="Georgia, Times New Roman, serif" font-size="430" font-weight="700" fill="#000000">T</text>
    <text x="338" y="500" font-family="Georgia, Times New Roman, serif" font-size="430" font-weight="700" fill="#1696c5">W</text>

    <text x="50" y="600" font-family="Georgia, Times New Roman, serif" font-size="146" letter-spacing="2" fill="#111642">USED CAR</text>
  </g>
</svg>
